[project]
name = "etlantic-prefect"
version = "0.17.0"
description = "Prefect ExecutionScheduler plugin for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "etlantic>=0.17.0,<0.18",
    "prefect>=3,<4",
]

[project.urls]
Homepage = "https://github.com/eddiethedean/etlantic"
Documentation = "https://github.com/eddiethedean/etlantic/tree/main/docs"
Repository = "https://github.com/eddiethedean/etlantic"
Issues = "https://github.com/eddiethedean/etlantic/issues"
Changelog = "https://github.com/eddiethedean/etlantic/blob/main/CHANGELOG.md"

[project.entry-points."etlantic.scheduler_plugins"]
prefect = "etlantic_prefect:create_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_prefect"]
