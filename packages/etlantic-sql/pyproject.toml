[project]
name = "etlantic-sql"
version = "0.8.0"
description = "PostgreSQL reference SQL execution plugin for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
dependencies = [
    "etlantic>=0.8.0,<0.8",
    "sqlalchemy>=2.0,<3",
    "psycopg[binary]>=3.1,<4",
]

[project.optional-dependencies]
sqlite = []

[project.entry-points."etlantic.sql_plugins"]
sql = "etlantic_sql:create_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_sql"]
