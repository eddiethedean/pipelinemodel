[project]
name = "etlantic-pyspark"
version = "0.16.0"
description = "PySpark reference execution plugin for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "etlantic>=0.16.0,<0.17",
    "pyspark>=3.5,<4",
]

[project.urls]
Homepage = "https://github.com/eddiethedean/etlantic"
Documentation = "https://github.com/eddiethedean/etlantic/tree/main/docs"
Repository = "https://github.com/eddiethedean/etlantic"
Issues = "https://github.com/eddiethedean/etlantic/issues"
Changelog = "https://github.com/eddiethedean/etlantic/blob/main/CHANGELOG.md"

[project.optional-dependencies]
delta = ["delta-spark>=3.0,<4"]

[project.entry-points."etlantic.spark_plugins"]
pyspark = "etlantic_pyspark:create_plugin"

[project.entry-points."etlantic.spark_providers"]
local = "etlantic_pyspark:create_provider"

[project.entry-points."etlantic.transform_compilers"]
pyspark = "etlantic_pyspark:create_transform_compiler"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_pyspark"]
