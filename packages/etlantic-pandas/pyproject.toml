[project]
name = "etlantic-pandas"
version = "0.8.0"
description = "Pandas dataframe execution plugin for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
dependencies = [
    "etlantic>=0.8.0,<0.8",
    "pandas>=2.0,<3",
]

[project.optional-dependencies]
arrow = ["pyarrow>=14"]

[project.entry-points."etlantic.dataframe_plugins"]
pandas = "etlantic_pandas:create_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_pandas"]
