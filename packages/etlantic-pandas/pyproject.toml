[project]
name = "etlantic-pandas"
version = "0.22.0"
description = "Pandas dataframe execution plugin for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "etlantic>=0.22.0,<0.23",
    "pandas>=2.2,<3",
]

[project.urls]
Homepage = "https://github.com/eddiethedean/etlantic"
Documentation = "https://github.com/eddiethedean/etlantic/tree/main/docs"
Repository = "https://github.com/eddiethedean/etlantic"
Issues = "https://github.com/eddiethedean/etlantic/issues"
Changelog = "https://github.com/eddiethedean/etlantic/blob/main/CHANGELOG.md"

[project.optional-dependencies]
arrow = ["pyarrow>=14"]

[project.entry-points."etlantic.dataframe_plugins"]
pandas = "etlantic_pandas:create_plugin"

[project.entry-points."etlantic.transform_compilers"]
pandas = "etlantic_pandas:create_transform_compiler"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_pandas"]

[tool.hatch.build.targets.wheel.force-include]
"src/etlantic_pandas/etlantic-plugin-manifest.json" = "etlantic_pandas/etlantic-plugin-manifest.json"
