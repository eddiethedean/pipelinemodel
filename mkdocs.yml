site_name: Pipelantic
site_description: Typed, contract-driven data pipeline modeling for Python.
site_url: https://pipelantic.readthedocs.io/
repo_url: https://github.com/eddiethedean/pipelantic
repo_name: eddiethedean/pipelantic
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  logo: theme/assets/pipelantic-logo.svg
  favicon: theme/assets/pipelantic-favicon.svg
  font:
    text: Inter
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: pipelantic-light
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: pipelantic-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.action.edit
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra_css:
  - theme/stylesheets/pipelantic.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            members_order: source
            show_root_heading: true
            show_source: false

