site_name: ETLantic
site_description: Typed, contract-driven data pipeline modeling for Python.
site_url: https://etlantic.readthedocs.io/
repo_url: https://github.com/eddiethedean/etlantic
repo_name: eddiethedean/etlantic
edit_uri: edit/main/docs/
docs_dir: docs

# Theme notes under docs/theme/ are maintainer-facing, not site pages.
exclude_docs: |
  theme/README.md
  11_DEVELOPMENT/CURSOR_EXTRACT_LOAD_MIGRATION_PROMPT.md
  11_DEVELOPMENT/PREFECT_SPIKE_NOTES.md

validation:
  omitted_files: warn
  absolute_links: relative_to_docs
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  logo: theme/assets/etlantic-logo.svg
  favicon: theme/assets/etlantic-favicon.svg
  font:
    text: Inter
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: etlantic-light
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra_css:
  - theme/stylesheets/etlantic.css

extra_javascript:
  - theme/javascripts/status-banner.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            members_order: source
            show_root_heading: true
            show_source: false

