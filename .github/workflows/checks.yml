name: Checks

on:
  workflow_call:

jobs:
  checks:
    name: Lint and test (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest (core)
        run: uv run pytest -q -m "not sparkforge and not polars and not pandas and not sql and not spark and not airflow and not prefect and not keyring and not sqlmodel"

      - name: Documentation consistency
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run python scripts/check_docs.py

      - name: Agent guidance drift check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run python scripts/check_agent_guidance.py

      - name: Transform compiler drift check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run --group polars --group pandas --group sql --group pyspark python scripts/check_transform_compiler_drift.py

      - name: Release readiness check
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run python scripts/check_release.py

      - name: Runnable example
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run python examples/quickstart.py

      - name: CLI SARIF smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          uv run etlantic validate examples/quickstart.py:CustomerPipeline --format sarif > /tmp/etlantic.sarif
          python -c "import json; json.load(open('/tmp/etlantic.sarif')); print('sarif ok')"

      - name: MkDocs
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: uv run python scripts/build_docs.py

  dataframes:
    name: Dataframe plugins (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [polars, pandas]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with one engine plugin
        run: uv sync --locked --group ${{ matrix.engine }}

      - name: Discovery smoke (entry points only)
        run: |
          uv run python -c "
          from etlantic.dataframe.discovery import discover_dataframe_plugins
          found = discover_dataframe_plugins()
          assert '${{ matrix.engine }}' in found, found
          print('discovered', sorted(found))
          "

      - name: Pytest dataframe suite
        run: uv run pytest -q tests/dataframe -m "${{ matrix.engine }}"

      - name: Pytest Polars portable compiler
        if: matrix.engine == 'polars'
        run: uv run pytest -q tests/polars_compiler -m polars

      - name: Pytest Pandas portable compiler
        if: matrix.engine == 'pandas'
        run: uv run pytest -q tests/pandas_compiler -m pandas

      - name: Public portable transform conformance
        run: uv run pytest -q tests/portable_conformance -m "${{ matrix.engine }}"

      - name: Runnable parity example
        run: uv run python examples/dataframe_parity.py ${{ matrix.engine }}

  sql:
    name: SQL plugin
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: etlantic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with SQL plugin
        run: uv sync --locked --group sql

      - name: Discovery smoke
        run: |
          uv run python -c "
          from etlantic.sql.discovery import discover_sql_plugins
          found = discover_sql_plugins()
          assert 'sql' in found, found
          print('discovered', sorted(found))
          "

      - name: Pytest SQL suite (SQLite IR + runtime)
        env:
          ETLANTIC_SQL_URL: "sqlite+pysqlite:///:memory:"
        run: uv run pytest -q tests/sql -m sql

      - name: Pytest SQL suite (PostgreSQL)
        env:
          ETLANTIC_SQL_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/etlantic"
        run: uv run pytest -q tests/sql -m sql

      - name: Runnable SQL examples
        env:
          ETLANTIC_SQL_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/etlantic"
        run: |
          uv run python examples/sql_to_sql.py
          uv run python examples/sql_transactional_write.py
          uv run python examples/sql_boundary_hybrid.py
          uv run python examples/sql_failure_recovery.py

  spark:
    name: PySpark plugin (sparkless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with PySpark plugin + sparkless
        run: uv sync --locked --group pyspark

      - name: Discovery smoke
        run: |
          uv run python -c "
          from etlantic.spark.discovery import discover_spark_plugins
          found = discover_spark_plugins()
          assert 'pyspark' in found, found
          print('discovered', sorted(found))
          "

      - name: Pytest Spark suite (sparkless)
        env:
          SPARKLESS_TEST_MODE: sparkless
        run: uv run pytest -q tests/spark -m spark

      - name: Pytest PySpark portable compiler (sparkless)
        env:
          SPARKLESS_TEST_MODE: sparkless
        run: uv run pytest -q tests/pyspark_compiler -m spark

      - name: Public portable transform conformance (sparkless)
        env:
          SPARKLESS_TEST_MODE: sparkless
        run: uv run pytest -q tests/portable_conformance -m spark

      - name: Runnable Spark example
        env:
          SPARKLESS_TEST_MODE: sparkless
          ETLANTIC_SPARK_BACKEND: sparkless
        run: uv run python examples/pyspark_local.py

  portable-differentials:
    name: Portable Polars ↔ PySpark ↔ Pandas differentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Polars + Pandas + PySpark (sparkless)
        run: uv sync --locked --group polars --group pandas --group pyspark

      - name: Discovery smoke (compilers)
        run: |
          uv run python -c "
          from etlantic.transform.discovery import discover_transform_compilers
          found = discover_transform_compilers()
          assert set(found) >= {'polars', 'pyspark', 'pandas'}, found
          print('compilers', sorted(found))
          "

      - name: Pytest portable differentials (sparkless)
        env:
          SPARKLESS_TEST_MODE: sparkless
        run: uv run pytest -q tests/portable_differential

      - name: Public conformance against all three compilers
        env:
          SPARKLESS_TEST_MODE: sparkless
        run: |
          uv run pytest -q tests/portable_conformance -m "polars or pandas or spark"

  airflow:
    name: Airflow orchestrator plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with Airflow plugin
        run: uv sync --locked --group airflow

      - name: Discovery smoke
        run: |
          uv run python -c "
          from etlantic.orchestration.discovery import discover_orchestrator_plugins
          found = discover_orchestrator_plugins()
          assert 'airflow' in found, found
          print('discovered', sorted(found))
          "

      - name: Pytest orchestration + Airflow compile suite
        run: |
          uv run pytest -q tests/orchestration
          uv run pytest -q tests/airflow -m airflow

      - name: Runnable Airflow compile example
        run: uv run python examples/airflow_compile.py

  prefect:
    name: Prefect scheduler plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with Prefect plugin
        run: uv sync --locked --group prefect

      - name: Discovery smoke
        run: |
          uv run python -c "
          from etlantic.runtime.scheduler_discovery import discover_scheduler_plugins
          found = discover_scheduler_plugins()
          assert 'prefect' in found, found
          print('discovered', sorted(found))
          "

      - name: Pytest Prefect suite
        run: uv run pytest -q tests/prefect -m prefect

      - name: Runnable Prefect example
        run: uv run python examples/prefect_run.py

  keyring:
    name: Keyring secret provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync with keyring package
        run: uv sync --locked --group keyring
      - name: Pytest keyring suite
        run: uv run pytest -q tests/keyring -m keyring

  sqlmodel:
    name: SQLModel integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync with sqlmodel package
        run: uv sync --locked --group sqlmodel
      - name: Pytest sqlmodel suite
        run: uv run pytest -q tests/sqlmodel -m sqlmodel

  sparkforge:
    name: SparkForge migration adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync with sparkforge package
        run: uv sync --locked --group sparkforge
      - name: Pytest sparkforge parity suite
        run: uv run pytest -q tests/sparkforge -m sparkforge

  package:
    name: Build and test wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync dependencies
        run: uv sync --locked

      - name: Build core wheel
        run: |
          rm -rf dist
          mkdir -p dist
          uv build --package etlantic

      - name: Build sparkforge wheel
        run: uv build --package etlantic-sparkforge

      - name: Pytest against installed wheel
        shell: bash
        run: |
          shopt -s nullglob
          # Keep only the core package wheel (etlantic-VERSION-...), not plugins.
          core_wheels=()
          for w in dist/etlantic-*.whl; do
            base="$(basename "$w")"
            if [[ "$base" =~ ^etlantic-[0-9] ]]; then
              core_wheels+=("$w")
            fi
          done
          if [ "${#core_wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one etlantic core wheel in dist/, found ${#core_wheels[@]}"
            ls -la dist/ || true
            exit 1
          fi
          WHEEL="${core_wheels[0]}"
          echo "Testing wheel: $WHEEL"
          uv run --isolated --no-project --with "$WHEEL" --with pytest \
            python -m pytest -q tests/unit tests/cli

      - name: SparkForge wheel import smoke
        shell: bash
        run: |
          shopt -s nullglob
          sf_wheels=(dist/etlantic_sparkforge-*.whl)
          if [ "${#sf_wheels[@]}" -lt 1 ]; then
            echo "Expected etlantic-sparkforge wheel in dist/"
            ls -la dist/ || true
            exit 1
          fi
          SF="${sf_wheels[0]}"
          CORE=""
          for w in dist/etlantic-*.whl; do
            base="$(basename "$w")"
            if [[ "$base" =~ ^etlantic-[0-9] ]]; then
              CORE="$w"
              break
            fi
          done
          echo "Smoke testing: $SF with $CORE"
          uv run --isolated --no-project --with "$CORE" --with "$SF" \
            python -c "import etlantic_sparkforge as s; import etlantic; assert s.__version__ == etlantic.__version__; print(s.__version__)"
