name: Checks

on:
  workflow_call:

jobs:
  checks:
    name: Lint and test (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest -q

  package:
    name: Build and test wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Build
        run: uv build

      - name: Pytest against installed wheel
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel in dist/, found ${#wheels[@]}"
            ls -la dist/ || true
            exit 1
          fi
          WHEEL="${wheels[0]}"
          echo "Testing wheel: $WHEEL"
          uv run --isolated --no-project --with "$WHEEL" --with pytest \
            python -m pytest -q
