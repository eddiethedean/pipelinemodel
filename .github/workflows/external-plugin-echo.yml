name: External plugin echo

# Out-of-monorepo Plugin SDK proof (etlantic-plugin-echo).
# Clones the public reference plugin and runs its public conformance suite
# against the workspace core.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
    paths:
      - "src/etlantic/testing/**"
      - "src/etlantic/dataframe/**"
      - "src/etlantic/plugin_compatibility.py"
      - "src/etlantic/plugin_manifest.py"
      - "src/etlantic/capabilities.py"
      - ".github/workflows/external-plugin-echo.yml"

concurrency:
  group: echo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  echo-conformance:
    name: etlantic-plugin-echo conformance
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'external-plugin') ||
      github.event_name == 'push'
    steps:
      - name: Checkout ETLantic
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync workspace core
        run: uv sync --locked

      - name: Clone etlantic-plugin-echo
        run: |
          git clone --depth 1 \
            https://github.com/eddiethedean/etlantic-plugin-echo.git \
            /tmp/etlantic-plugin-echo

      - name: Install echo against workspace core
        run: |
          # Core may be mid-minor during RC; install echo without resolving its
          # published pin so the workspace package is the authority.
          uv pip install --python .venv/bin/python --no-deps -e /tmp/etlantic-plugin-echo

      - name: Run public conformance suite
        run: |
          uv run --python .venv/bin/python pytest -q /tmp/etlantic-plugin-echo/tests

      - name: Plugin compatibility report
        run: |
          uv run etlantic plugin compatibility etlantic-plugin-echo --format json
